<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 洛克王国孵蛋系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", "PingFang SC", sans-serif;
        }
        :root {
            --primary: #2563eb;
            --danger: #dc2626;
            --success: #059669;
            --gray: #64748b;
            --light-gray: #f1f5f9;
            --white: #ffffff;
            --radius: 12px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }
        html, body {
            width: 100%;
            height: 100%;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: url("https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=洛克王国%20魔法%20城堡%20背景%20梦幻%20蓝色%20天空%20云朵&image_size=landscape_16_9") center/cover no-repeat;
            position: relative;
            padding: 20px;
        }
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.2), rgba(0, 0, 0, 0.3));
        }
        .login-box {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            padding: 40px 35px;
            box-shadow: var(--shadow);
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            font-size: 1.8rem;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .login-header p {
            color: var(--gray);
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.95rem;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            background: var(--white);
            transition: all 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }
        .captcha-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .captcha-row input {
            flex: 1;
        }
        .captcha-code {
            padding: 12px 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 8px;
            font-weight: 700;
            min-width: 120px;
            text-align: center;
            user-select: none;
            cursor: pointer;
            white-space: nowrap;
        }
        .error-tip {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .login-btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }
        .back-home {
            text-align: center;
            margin-top: 20px;
        }
        .back-home a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.95rem;
        }
        .back-home a:hover {
            text-decoration: underline;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-box {
            background: white;
            border-radius: var(--radius);
            padding: 35px;
            width: 100%;
            max-width: 400px;
        }
        .modal-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 20px;
            text-align: center;
        }
        .modal-desc {
            color: var(--gray);
            font-size: 0.95rem;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-header">
            <h1>管理员登录</h1>
            <p>洛克王国孵蛋查询系统后台</p>
        </div>

        <div class="form-group">
            <label for="username">管理员账号/工号</label>
            <input type="text" id="username" placeholder="请输入管理员账号或工号">
            <div class="error-tip" id="usernameError"></div>
        </div>

        <div class="form-group">
            <label for="password">管理员密码</label>
            <input type="password" id="password" placeholder="请输入管理员密码">
            <div class="error-tip" id="passwordError"></div>
        </div>

        <div class="form-group">
            <label>验证码</label>
            <div class="captcha-row">
                <input type="number" id="captchaInput" placeholder="请输入计算结果">
                <div class="captcha-code" id="captchaCode"></div>
            </div>
            <div class="error-tip" id="captchaError"></div>
        </div>

        <div class="error-tip" id="globalError" style="text-align: center; font-size: 0.9rem;"></div>

        <button class="login-btn" id="loginBtn">登录后台</button>

        <div class="back-home" style="margin-top: 10px;">
            <a href="#" id="forgotPasswordLink">忘记密码？</a>
        </div>

        <div class="back-home">
            <a href="index.html">← 返回前台首页</a>
        </div>
    </div>

    <div class="modal" id="changePwdModal">
        <div class="modal-box">
            <div class="modal-title">首次登录必须修改密码</div>
            <div class="modal-desc">为了账号安全，请修改你的初始密码</div>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" id="newPwd" placeholder="请输入新密码">
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" id="confirmNewPwd" placeholder="请再次输入新密码">
            </div>
            <div class="error-tip" id="pwdError"></div>
            <button class="login-btn" id="confirmChangePwdBtn">确认修改并登录</button>
        </div>
    </div>

    <div class="modal" id="resetPasswordModal">
        <div class="modal-box">
            <div class="modal-title">重置密码</div>
            <div class="modal-desc">请选择重置密码的验证方式</div>
            
            <div class="form-group">
                <label>管理员账号/工号</label>
                <input type="text" id="resetUsername" placeholder="请输入管理员账号或工号">
            </div>
            
            <div class="form-group">
                <label>验证方式</label>
                <select id="resetMethod">
                    <option value="email">验证邮箱</option>
                    <option value="key">密码重置秘钥</option>
                </select>
            </div>
            
            <div class="form-group" id="emailGroup">
                <label>邮箱地址</label>
                <input type="email" id="resetEmail" placeholder="请输入绑定的邮箱地址">
            </div>
            
            <div class="form-group" id="keyGroup" style="display: none;">
                <label>密码重置密钥</label>
                <input type="text" id="resetKey" placeholder="请输入密码重置密钥">
            </div>
            
            <div class="form-group">
                <label>新密码</label>
                <input type="password" id="resetNewPwd" placeholder="请输入新密码">
            </div>
            
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" id="resetConfirmNewPwd" placeholder="请再次输入新密码">
            </div>
            
            <div class="error-tip" id="resetError"></div>
            <button class="login-btn" id="confirmResetPwdBtn">确认重置密码</button>
            <button class="login-btn" style="background: #64748b; margin-top: 10px;" id="cancelResetBtn">取消</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            // 加载登录页面背景图片
            loadLoginBackgroundImage();
            
            // 全局配置
            var CONFIG = {
                SALT: "luoke_fudan_2024",
                MAX_ERROR_COUNT: 5,
                LOCK_DURATION: 24 * 60 * 60 * 1000,
                OPERATORS: ["+", "-", "*"],
                DEFAULT_PWD: "123456"
            };

            // 加载登录页面背景图片
            function loadLoginBackgroundImage() {
                var settings = JSON.parse(localStorage.getItem("settings") || "{}");
                if (settings.loginBgImage) {
                    document.body.style.backgroundImage = 'url("' + settings.loginBgImage + '")';
                } else {
                    // 默认背景图片
                    document.body.style.backgroundImage = 'url("images/login-bg.jpg")';
                }
            }

            // 全局变量
            var currentCaptchaAnswer = 0;
            var tempLoginUser = null;

            // 工具函数
            function encryptPwd(password) {
                // 使用SHA-256哈希算法加密密码
                var encoder = new TextEncoder();
                var data = encoder.encode(password + CONFIG.SALT);
                return crypto.subtle.digest('SHA-256', data).then(function(hash) {
                    var hex = '';
                    var bytes = new Uint8Array(hash);
                    for (var i = 0; i < bytes.length; i++) {
                        hex += bytes[i].toString(16).padStart(2, '0');
                    }
                    return hex;
                });
            }

            function verifyPwd(inputPassword, storedHash) {
                // 验证密码
                var encoder = new TextEncoder();
                var data = encoder.encode(inputPassword + CONFIG.SALT);
                return crypto.subtle.digest('SHA-256', data).then(function(hash) {
                    var hex = '';
                    var bytes = new Uint8Array(hash);
                    for (var i = 0; i < bytes.length; i++) {
                        hex += bytes[i].toString(16).padStart(2, '0');
                    }
                    
                    // 检查是否是旧的base64格式
                    if (hex !== storedHash) {
                        // 尝试旧的验证方式
                        try {
                            var oldDecrypted = atob(storedHash).replace(CONFIG.SALT, "");
                            if (oldDecrypted === inputPassword) {
                                // 转换为新格式
                                return true;
                            }
                        } catch (e) {
                            // 不是base64格式，继续验证
                        }
                    }
                    
                    return hex === storedHash;
                });
            }

            // 生成验证码
            function generateCaptcha() {
                var num1 = Math.floor(Math.random() * 100) + 1;
                var num2 = Math.floor(Math.random() * 100) + 1;
                var op = CONFIG.OPERATORS[Math.floor(Math.random() * CONFIG.OPERATORS.length)];
                var answer, text;

                switch(op) {
                    case "+":
                        answer = num1 + num2;
                        text = num1 + " + " + num2 + " = ?";
                        break;
                    case "-":
                        var max = Math.max(num1, num2);
                        var min = Math.min(num1, num2);
                        answer = max - min;
                        text = max + " - " + min + " = ?";
                        break;
                    case "*":
                        var n1 = Math.floor(Math.random() * 20) + 1;
                        var n2 = Math.floor(Math.random() * 10) + 1;
                        answer = n1 * n2;
                        text = n1 + " × " + n2 + " = ?";
                        break;
                }
                return { text: text, answer: answer };
            }

            // 初始化管理员数据
            function initAdminData() {
                var adminList = localStorage.getItem("adminList");
                if (!adminList) {
                    // 使用SHA-256哈希算法加密默认密码
                    var encoder = new TextEncoder();
                    var data = encoder.encode("qaz123456" + CONFIG.SALT);
                    crypto.subtle.digest('SHA-256', data).then(function(hash) {
                        var hex = '';
                        var bytes = new Uint8Array(hash);
                        for (var i = 0; i < bytes.length; i++) {
                            hex += bytes[i].toString(16).padStart(2, '0');
                        }
                        var year = new Date().getFullYear().toString();
                        var employeeId = year + "001";
                        var superAdmin = {
                            username: "17207075015",
                            employeeId: employeeId,
                            password: hex,
                            role: "super",
                            firstLogin: false,
                            createTime: new Date().toLocaleString("zh-CN"),
                            errorCount: 0,
                            lockTime: 0
                        };
                        localStorage.setItem("adminList", JSON.stringify([superAdmin]));
                    });
                }
            }

            // 获取管理员列表
            function getAdminList() {
                return JSON.parse(localStorage.getItem("adminList") || "[]");
            }

            // 保存管理员列表
            function saveAdminList(list) {
                localStorage.setItem("adminList", JSON.stringify(list));
            }

            // 清除错误提示
            function clearErrors() {
                var tips = document.querySelectorAll(".error-tip");
                for (var i = 0; i < tips.length; i++) {
                    tips[i].style.display = "none";
                    tips[i].innerText = "";
                }
            }

            // 显示错误提示
            function showError(elementId, message) {
                var el = document.getElementById(elementId);
                el.innerText = message;
                el.style.display = "block";
            }

            // DOM元素获取
            var usernameInput = document.getElementById("username");
            var passwordInput = document.getElementById("password");
            var captchaInput = document.getElementById("captchaInput");
            var captchaCode = document.getElementById("captchaCode");
            var loginBtn = document.getElementById("loginBtn");
            var changePwdModal = document.getElementById("changePwdModal");
            var newPwdInput = document.getElementById("newPwd");
            var confirmNewPwdInput = document.getElementById("confirmNewPwd");
            var confirmChangePwdBtn = document.getElementById("confirmChangePwdBtn");
            
            // 密码重置相关元素
            var forgotPasswordLink = document.getElementById("forgotPasswordLink");
            var resetPasswordModal = document.getElementById("resetPasswordModal");
            var resetMethod = document.getElementById("resetMethod");
            var emailGroup = document.getElementById("emailGroup");
            var keyGroup = document.getElementById("keyGroup");
            var resetUsername = document.getElementById("resetUsername");
            var resetEmail = document.getElementById("resetEmail");
            var resetKey = document.getElementById("resetKey");
            var resetNewPwd = document.getElementById("resetNewPwd");
            var resetConfirmNewPwd = document.getElementById("resetConfirmNewPwd");
            var confirmResetPwdBtn = document.getElementById("confirmResetPwdBtn");
            var cancelResetBtn = document.getElementById("cancelResetBtn");
            var resetError = document.getElementById("resetError");

            // 初始化
            initAdminData();
            // 刷新验证码
            var captcha = generateCaptcha();
            captchaCode.innerText = captcha.text;
            currentCaptchaAnswer = captcha.answer;

            // 已登录直接跳转后台
            if (localStorage.getItem("isLogin") === "true") {
                window.location.href = "admin.html";
            }

            // 点击刷新验证码
            captchaCode.onclick = function() {
                var newCaptcha = generateCaptcha();
                captchaCode.innerText = newCaptcha.text;
                currentCaptchaAnswer = newCaptcha.answer;
            };

            // 登录逻辑
            loginBtn.onclick = async function() {
                clearErrors();
                var username = usernameInput.value.trim();
                var password = passwordInput.value.trim();
                var captcha = captchaInput.value.trim();

                // 基础校验
                if (!username) {
                    showError("usernameError", "请输入管理员账号");
                    return;
                }
                if (!password) {
                    showError("passwordError", "请输入管理员密码");
                    return;
                }
                if (!captcha) {
                    showError("captchaError", "请输入验证码");
                    return;
                }
                if (parseInt(captcha) !== currentCaptchaAnswer) {
                    showError("captchaError", "验证码错误");
                    var newCaptcha = generateCaptcha();
                    captchaCode.innerText = newCaptcha.text;
                    currentCaptchaAnswer = newCaptcha.answer;
                    captchaInput.value = "";
                    return;
                }

                // 校验账号
                var adminList = getAdminList();
                var adminIndex = -1;
                var admin = null;
                for (var i = 0; i < adminList.length; i++) {
                    if (adminList[i].username === username || adminList[i].employeeId === username) {
                        adminIndex = i;
                        admin = adminList[i];
                        break;
                    }
                }

                if (!admin) {
                    showError("globalError", "账号不存在");
                    return;
                }

                // 检查账号锁定
                var now = Date.now();
                if (admin.lockTime && now < admin.lockTime) {
                    var remainTime = Math.ceil((admin.lockTime - now) / (60 * 60 * 1000));
                    showError("globalError", "账号已锁定，请" + remainTime + "小时后再试");
                    return;
                }

                // 校验密码
                var isPasswordCorrect = await verifyPwd(password, admin.password);
                if (!isPasswordCorrect) {
                    adminList[adminIndex].errorCount += 1;
                    var errorCount = adminList[adminIndex].errorCount;

                    if (errorCount >= CONFIG.MAX_ERROR_COUNT) {
                        adminList[adminIndex].lockTime = now + CONFIG.LOCK_DURATION;
                        adminList[adminIndex].errorCount = 0;
                        saveAdminList(adminList);
                        showError("globalError", "密码错误次数过多，账号已锁定24小时");
                        // 记录登录失败日志
                        recordLoginLog(username, false, "密码错误次数过多，账号已锁定24小时", admin, errorCount);
                        return;
                    }

                    saveAdminList(adminList);
                    var errorMessage = "密码错误，还剩" + (CONFIG.MAX_ERROR_COUNT - errorCount) + "次机会";
                    showError("globalError", errorMessage);
                    // 记录登录失败日志
                    recordLoginLog(username, false, errorMessage, admin, errorCount);
                    var newCaptcha = generateCaptcha();
                    captchaCode.innerText = newCaptcha.text;
                    currentCaptchaAnswer = newCaptcha.answer;
                    passwordInput.value = "";
                    captchaInput.value = "";
                    return;
                }

                // 检查是否是旧的base64格式密码
                var isOldFormat = false;
                try {
                    atob(admin.password);
                    isOldFormat = true;
                } catch (e) {
                    isOldFormat = false;
                }

                // 登录成功，重置错误信息
                adminList[adminIndex].errorCount = 0;
                adminList[adminIndex].lockTime = 0;
                
                // 获取IP地址
                function getIPAddress() {
                    return new Promise((resolve) => {
                        // 尝试使用第三方服务获取IP地址
                        fetch('https://api.ipify.org?format=json')
                            .then(response => response.json())
                            .then(data => resolve(data.ip))
                            .catch(() => resolve("未知"));
                    });
                }

                // 获取设备型号
                function getDeviceModel() {
                    var userAgent = navigator.userAgent;
                    var deviceModel = "未知";
                    
                    // 检测常见设备
                    if (userAgent.includes("iPhone")) {
                        deviceModel = "iPhone";
                    } else if (userAgent.includes("iPad")) {
                        deviceModel = "iPad";
                    } else if (userAgent.includes("Android")) {
                        deviceModel = "Android";
                    } else if (userAgent.includes("Windows")) {
                        deviceModel = "Windows";
                    } else if (userAgent.includes("Macintosh")) {
                        deviceModel = "Mac";
                    }
                    
                    return deviceModel;
                }

                // 记录登录日志
                async function recordLoginLog(username, success, message = "", admin = null, errorCount = 0) {
                    var ip = await getIPAddress();
                    var deviceModel = getDeviceModel();
                    var loginLog = JSON.parse(localStorage.getItem("loginLog") || "[]");
                    loginLog.unshift({
                        time: new Date().toLocaleString("zh-CN"),
                        username: username,
                        name: admin ? admin.name || "" : "",
                        employeeId: admin ? admin.employeeId || "" : "",
                        success: success,
                        message: message,
                        errorCount: errorCount,
                        ip: ip,
                        deviceModel: deviceModel,
                        userAgent: navigator.userAgent
                    });
                    // 只保留最近1000条日志
                    if (loginLog.length > 1000) {
                        loginLog = loginLog.slice(0, 1000);
                    }
                    localStorage.setItem("loginLog", JSON.stringify(loginLog));
                }
                
                // 如果是旧格式，转换为新的SHA-256格式
                if (isOldFormat) {
                    encryptPwd(password).then(async function(hashedPassword) {
                        adminList[adminIndex].password = hashedPassword;
                        saveAdminList(adminList);
                        
                        // 记录登录日志
                        await recordLoginLog(admin.username, true, "登录成功", admin, 0);
                        
                        // 首次登录强制改密
                        if (admin.firstLogin) {
                            tempLoginUser = admin;
                            changePwdModal.style.display = "flex";
                        } else {
                            // 正常登录
                            window.location.href = "admin.html?username=" + encodeURIComponent(admin.username) + "&token=" + encodeURIComponent(btoa(hashedPassword));
                        }
                    });
                } else {
                    saveAdminList(adminList);
                    
                    // 记录登录日志
                    recordLoginLog(admin.username, true, "登录成功", admin, 0);
                    
                    // 首次登录强制改密
                    if (admin.firstLogin) {
                        tempLoginUser = admin;
                        changePwdModal.style.display = "flex";
                    } else {
                        // 正常登录
                        window.location.href = "admin.html?username=" + encodeURIComponent(admin.username) + "&token=" + encodeURIComponent(btoa(admin.password));
                    }
                }
            };

            // 强制改密逻辑
            confirmChangePwdBtn.onclick = async function() {
                var newPwd = newPwdInput.value.trim();
                var confirmPwd = confirmNewPwdInput.value.trim();

                if (!newPwd || !confirmPwd) {
                    showError("pwdError", "请输入新密码和确认密码");
                    return;
                }
                if (newPwd !== confirmPwd) {
                    showError("pwdError", "两次输入的密码不一致");
                    return;
                }
                if (newPwd === CONFIG.DEFAULT_PWD) {
                    showError("pwdError", "新密码不能与初始密码相同");
                    return;
                }

                // 更新密码
                var adminList = getAdminList();
                var adminIndex = -1;
                for (var i = 0; i < adminList.length; i++) {
                    if (adminList[i].username === tempLoginUser.username) {
                        adminIndex = i;
                        break;
                    }
                }
                var hashedPassword = await encryptPwd(newPwd);
                adminList[adminIndex].password = hashedPassword;
                adminList[adminIndex].firstLogin = false;
                saveAdminList(adminList);

                // 登录跳转 - 不使用localStorage存储登录状态
                var admin = adminList[adminIndex];
                window.location.href = "admin.html?username=" + encodeURIComponent(admin.username) + "&token=" + encodeURIComponent(btoa(hashedPassword));
            };

            // 验证方式切换
            resetMethod.addEventListener("change", function() {
                if (this.value === "email") {
                    emailGroup.style.display = "block";
                    keyGroup.style.display = "none";
                } else {
                    emailGroup.style.display = "none";
                    keyGroup.style.display = "block";
                }
            });

            // 忘记密码链接点击事件
            forgotPasswordLink.addEventListener("click", function(e) {
                e.preventDefault();
                resetPasswordModal.style.display = "flex";
            });

            // 取消重置
            cancelResetBtn.addEventListener("click", function() {
                resetPasswordModal.style.display = "none";
                resetError.style.display = "none";
                resetError.innerText = "";
                resetUsername.value = "";
                resetEmail.value = "";
                resetKey.value = "";
                resetNewPwd.value = "";
                resetConfirmNewPwd.value = "";
            });

            // 确认重置密码
            confirmResetPwdBtn.addEventListener("click", async function() {
                resetError.style.display = "none";
                resetError.innerText = "";
                
                var username = resetUsername.value.trim();
                var method = resetMethod.value;
                var email = resetEmail.value.trim();
                var key = resetKey.value.trim();
                var newPwd = resetNewPwd.value.trim();
                var confirmPwd = resetConfirmNewPwd.value.trim();

                // 验证输入
                if (!username) {
                    showError("resetError", "请输入管理员账号");
                    return;
                }
                
                if (method === "email" && !email) {
                    showError("resetError", "请输入邮箱地址");
                    return;
                }
                
                if (method === "key" && !key) {
                    showError("resetError", "请输入密码重置秘钥");
                    return;
                }
                
                if (!newPwd || !confirmPwd) {
                    showError("resetError", "请输入新密码和确认密码");
                    return;
                }
                
                if (newPwd !== confirmPwd) {
                    showError("resetError", "两次输入的密码不一致");
                    return;
                }
                
                if (newPwd === CONFIG.DEFAULT_PWD) {
                    showError("resetError", "新密码不能与初始密码相同");
                    return;
                }

                // 查找管理员
                var adminList = getAdminList();
                var adminIndex = -1;
                var admin = null;
                for (var i = 0; i < adminList.length; i++) {
                    if (adminList[i].username === username || adminList[i].employeeId === username) {
                        adminIndex = i;
                        admin = adminList[i];
                        break;
                    }
                }

                if (!admin) {
                    showError("resetError", "管理员账号不存在");
                    return;
                }

                // 验证方式
                var isVerified = false;
                if (method === "email") {
                    if (admin.email === email) {
                        isVerified = true;
                    } else {
                        showError("resetError", "邮箱地址验证失败");
                        return;
                    }
                } else if (method === "key") {
                    if (admin.resetKey === key) {
                        isVerified = true;
                    } else {
                        showError("resetError", "密码重置秘钥验证失败");
                        return;
                    }
                }

                if (isVerified) {
                    // 重置密码
                    var hashedPassword = await encryptPwd(newPwd);
                    adminList[adminIndex].password = hashedPassword;
                    adminList[adminIndex].firstLogin = false;
                    saveAdminList(adminList);

                    // 记录密码重置日志
                    async function recordResetLog(username, success, method, message = "") {
                        var ip = await getIPAddress();
                        var deviceModel = getDeviceModel();
                        var resetLog = JSON.parse(localStorage.getItem("resetLog") || "[]");
                        resetLog.unshift({
                            time: new Date().toLocaleString("zh-CN"),
                            username: username,
                            employeeId: admin.employeeId || "未知",
                            success: success,
                            method: method,
                            message: message,
                            ip: ip,
                            deviceModel: deviceModel,
                            userAgent: navigator.userAgent
                        });
                        // 只保留最近1000条日志
                        if (resetLog.length > 1000) {
                            resetLog = resetLog.slice(0, 1000);
                        }
                        localStorage.setItem("resetLog", JSON.stringify(resetLog));
                    }

                    // 调用记录日志
                    await recordResetLog(username, true, method, "密码重置成功");

                    alert("密码重置成功，请使用新密码登录");
                    resetPasswordModal.style.display = "none";
                    resetUsername.value = "";
                    resetEmail.value = "";
                    resetKey.value = "";
                    resetNewPwd.value = "";
                    resetConfirmNewPwd.value = "";
                }
            });

            // 回车登录
            usernameInput.onkeydown = function(e) { if (e.key === "Enter") loginBtn.click(); };
            passwordInput.onkeydown = function(e) { if (e.key === "Enter") loginBtn.click(); };
            captchaInput.onkeydown = function(e) { if (e.key === "Enter") loginBtn.click(); };
        };
    </script>
</body>
</html>
